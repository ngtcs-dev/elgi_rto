[General]
camera_width = 1920
camera_height = 1080

[Cameras]
; 0 = default webcam, or use RTSP URL for IP camera
entry_camera_url = 0
exit_camera_url = 1

[Server]
host = 0.0.0.0
port = 9999

[Storage]
; Change this path anytime — code reads it dynamically
captures_dir = captures
; Seconds before the same plate can be saved again (prevents duplicates)
cooldown_seconds = 300

[Detection]
; 0 = disable motion gate (not recommended for production)
motion_threshold = 5000
; Frames between OCR attempts (30fps camera: 15 ≈ 2 per second)
process_interval = 5
; How many times the same plate must be seen before saving
required_hits = 2

[Plate]
; If all vehicles belong to one state, force that 2-letter code here.
; Leave empty to use OCR state detection.
forced_state_code = OD
